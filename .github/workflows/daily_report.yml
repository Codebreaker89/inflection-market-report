name: Daily Market Report

on:
  # Auto-run every weekday at 9:00 AM EST (14:00 UTC)
  schedule:
    - cron: '0 14 * * 1-5'

  # Manual trigger — click "Run workflow" from any browser / phone
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy matplotlib yfinance

      - name: Generate market report
        run: python market_report.py

      - name: Rename to index.html for Pages
        run: cp market_report.html index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: index.html
          commit_message: "Market report: ${{ github.run_number }}"
