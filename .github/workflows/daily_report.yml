name: Daily Reports

on:
  # Weekdays at 8:00 AM Berlin time (CET = UTC+1 → 07:00 UTC)
  schedule:
    - cron: '0 7 * * 1-5'

  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Combined install — market report deps + metal tracker deps
      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib yfinance \
                      feedparser beautifulsoup4 requests

      # ── Report 1: sector rotation / stock picks ────────────────────────────
      - name: Generate market report
        run: python market_report.py

      # ── Report 2: metal supply tracker ────────────────────────────────────
      - name: Generate metal tracker
        run: python metal_tracker.py

      # ── Commit both HTMLs back to main ────────────────────────────────────
      - name: Commit reports to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f market_report.html metal_tracker.html
          git diff --cached --quiet || git commit -m "chore: update reports [skip ci]"
          git pull --rebase origin main
          git push
