name: Daily Market Report

on:
  # Auto-run every weekday at 9:00 AM EST (14:00 UTC)
  schedule:
    - cron: '0 14 * * 1-5'

  # Manual trigger — click "Run workflow" from any browser / phone
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy matplotlib yfinance

      - name: Generate market report
        run: python market_report.py

      - name: Prepare site folder
        run: |
          mkdir -p _site
          cp market_report.html _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
