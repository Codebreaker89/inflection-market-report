name: Daily Market Report

on:
  # Auto-run every weekday at 9:00 AM EST (14:00 UTC)
  schedule:
    - cron: '0 14 * * 1-5'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy matplotlib yfinance

      - name: Generate market report
        run: python market_report.py

      - name: Commit report to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f market_report.html
          git diff --cached --quiet || git commit -m "chore: update market report [skip ci]"
          git push
